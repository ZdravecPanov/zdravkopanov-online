<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 780" role="img" aria-labelledby="title desc">
  <title id="title">MikroTik OpenVPN Remote Access Topology</title>
  <desc id="desc">Professional infrastructure diagram showing HQ Management Network communicating bidirectionally through an OpenVPN tunnel to a remote MikroTik router and Remote Site LAN, with Monitoring observing the tunnel and router separately, and Security Controls plus Validation Focus documented as supporting layers.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#02070d"/>
      <stop offset="100%" stop-color="#07111b"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#081724"/>
      <stop offset="100%" stop-color="#050b13"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#5eead4"/>
    </linearGradient>
    <linearGradient id="monitor" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#5eead4"/>
    </marker>
    <marker id="monitorArrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#60a5fa"/>
    </marker>
    <style>
      .title { fill:#e2e8f0; font: 700 34px "IBM Plex Mono","JetBrains Mono",monospace; letter-spacing:.02em; }
      .subtitle { fill:#94a3b8; font: 400 18px "Inter","Segoe UI",sans-serif; }
      .panel { fill:url(#panel); stroke:rgba(45,212,191,.52); stroke-width:2.2; rx:22; ry:22; }
      .panelThin { fill:url(#panel); stroke:rgba(96,165,250,.34); stroke-width:2; rx:22; ry:22; }
      .lane { fill:none; stroke:url(#accent); stroke-width:7; stroke-linecap:round; }
      .laneThin { fill:none; stroke:url(#accent); stroke-width:5; stroke-linecap:round; }
      .monitorLine { fill:none; stroke:url(#monitor); stroke-width:4; stroke-dasharray:13 10; stroke-linecap:round; }
      .boxTitle { fill:#e2e8f0; font: 700 18px "IBM Plex Mono","JetBrains Mono",monospace; }
      .boxText { fill:#9fb0bf; font: 400 14px "Inter","Segoe UI",sans-serif; }
      .note { fill:#7dd3fc; font: 500 16px "Inter","Segoe UI",sans-serif; }
      .sectionTitle { fill:#dbeafe; font: 700 20px "IBM Plex Mono","JetBrains Mono",monospace; }
      .sectionTitleGreen { fill:#d1fae5; font: 700 20px "IBM Plex Mono","JetBrains Mono",monospace; }
      .bulletBlue { fill:#bfdbfe; font: 400 15px "Inter","Segoe UI",sans-serif; }
      .bulletGreen { fill:#bbf7d0; font: 400 15px "Inter","Segoe UI",sans-serif; }
      .bulBlue { fill:#60a5fa; }
      .bul { fill:#86efac; }
    </style>
  </defs>

  <rect width="1400" height="780" fill="url(#bg)"/>

  <text x="70" y="78" class="title">MikroTik OpenVPN Remote Access</text>
  <text x="70" y="112" class="subtitle">Secure HQ-to-site administration with monitoring-backed validation.</text>

  <!-- Main traffic flow -->
  <rect x="70" y="188" width="260" height="170" class="panel"/>
  <text x="200" y="244" text-anchor="middle" class="boxTitle">
    <tspan x="200" dy="0">HQ Management</tspan>
    <tspan x="200" dy="22">Network</tspan>
  </text>
  <text x="200" y="295" text-anchor="middle" class="boxText">Trusted admin network</text>
  <text x="200" y="318" text-anchor="middle" class="boxText">Controlled access</text>
  <text x="200" y="341" text-anchor="middle" class="boxText">No public exposure</text>

  <rect x="386" y="214" width="280" height="126" class="panel"/>
  <text x="526" y="286" text-anchor="middle" class="boxTitle">OpenVPN Tunnel</text>
  <text x="526" y="316" text-anchor="middle" class="boxText">Certificate authentication</text>
  <text x="526" y="339" text-anchor="middle" class="boxText">Secure management path</text>

  <rect x="718" y="188" width="292" height="170" class="panel"/>
  <text x="864" y="244" text-anchor="middle" class="boxTitle">
    <tspan x="864" dy="0">Remote MikroTik</tspan>
  </text>
  <text x="864" y="286" text-anchor="middle" class="boxText">RouterOS 7.x</text>
  <text x="864" y="309" text-anchor="middle" class="boxText">Firewall / NAT / DHCP</text>
  <text x="864" y="332" text-anchor="middle" class="boxText">Managed through VPN</text>

  <rect x="1068" y="214" width="262" height="126" class="panelThin"/>
  <text x="1198" y="286" text-anchor="middle" class="boxTitle">
    <tspan x="1198" dy="0">Remote Site</tspan>
    <tspan x="1198" dy="22">LAN</tspan>
  </text>
  <text x="1198" y="325" text-anchor="middle" class="boxText">Local devices</text>
  <text x="1198" y="348" text-anchor="middle" class="boxText">Policy-controlled access</text>

  <path d="M330 273 H386" class="lane"/>`n  <text x="358" y="280" text-anchor="middle" class="boxTitle" style="fill:#5eead4;font-size:36px;font-weight:700;">↔</text>
  <path d="M666 273 H718" class="lane"/>`n  <text x="692" y="280" text-anchor="middle" class="boxTitle" style="fill:#5eead4;font-size:36px;font-weight:700;">↔</text>
  <path d="M1010 273 H1068" class="laneThin" marker-end="url(#arrow)"/>
  <path d="M1198 340 V394" class="laneThin" marker-end="url(#arrow)"/>

  <!-- Supporting layers -->
  <rect x="70" y="444" width="372" height="168" class="panelThin"/>
  <text x="226" y="496" text-anchor="middle" class="sectionTitle">Monitoring</text>
  <text x="226" y="530" text-anchor="middle" class="bulletBlue"><tspan class="bulBlue">•</tspan> Zabbix + Grafana</text>
  <text x="226" y="556" text-anchor="middle" class="bulletBlue"><tspan class="bulBlue">•</tspan> Tunnel and service visibility</text>
  <text x="226" y="582" text-anchor="middle" class="bulletBlue"><tspan class="bulBlue">•</tspan> Separate from traffic path</text>

  <rect x="486" y="444" width="360" height="168" class="panelThin"/>
  <text x="666" y="496" text-anchor="middle" class="sectionTitleGreen">Security Controls</text>
  <text x="556" y="530" class="bulletGreen"><tspan class="bul">•</tspan> Certificate Authentication</text>
  <text x="556" y="556" class="bulletGreen"><tspan class="bul">•</tspan> Restricted Routing</text>
  <text x="556" y="582" class="bulletGreen"><tspan class="bul">•</tspan> Trusted Management Networks</text>

  <rect x="884" y="444" width="446" height="168" class="panelThin"/>
  <text x="1127" y="496" text-anchor="middle" class="sectionTitle">Validation Focus</text>
  <text x="1127" y="530" text-anchor="middle" class="bulletBlue"><tspan class="bulBlue">•</tspan> Tunnel status</text>
  <text x="1127" y="556" text-anchor="middle" class="bulletBlue"><tspan class="bulBlue">•</tspan> Routing verification</text>
  <text x="1127" y="582" text-anchor="middle" class="bulletBlue"><tspan class="bulBlue">•</tspan> Firewall validation</text>
  <text x="1127" y="608" text-anchor="middle" class="bulletBlue"><tspan class="bulBlue">•</tspan> Reachability testing</text>

  <!-- Monitoring links -->
  <path d="M256 444 C256 408, 466 408, 526 340" class="monitorLine" marker-end="url(#monitorArrow)"/>
  <path d="M438 478 C595 420, 770 420, 864 340" class="monitorLine" marker-end="url(#monitorArrow)"/>

  <text x="70" y="672" class="note">Public diagram omits credentials, certificates, internal addressing, and deployment secrets.</text>
</svg>



