      (() => {
        const isMediaHash = (hash) => /^#(img|vid)-\d+$/.test(hash);

        const closeModal = () => {
          if (!isMediaHash(window.location.hash)) return;
          const x = window.scrollX;
          const y = window.scrollY;
          window.location.hash = '';
          if (history.replaceState) {
            history.replaceState(null, '', window.location.pathname + window.location.search);
          }
          window.scrollTo(x, y);
        };

        const handleEscape = (event) => {
          const isEscape = event.key === 'Escape' || event.key === 'Esc' || event.keyCode === 27;
          if (!isEscape) return;
          closeModal();
        };


        const handleArrowNavigation = (event) => {
          if (!isMediaHash(window.location.hash)) return;
          const match = window.location.hash.match(/^#img-(\d+)$/);
          if (!match) return;

          const totalImages = document.querySelectorAll('.media-modal[id^="img-"]').length;
          if (totalImages < 2) return;

          const currentIndex = Number(match[1]);
          if (Number.isNaN(currentIndex)) return;

          if (event.key === 'ArrowRight') {
            event.preventDefault();
            const nextIndex = currentIndex === totalImages - 1 ? 0 : currentIndex + 1;
            window.location.hash = `img-${nextIndex}`;
          }

          if (event.key === 'ArrowLeft') {
            event.preventDefault();
            const prevIndex = currentIndex === 0 ? totalImages - 1 : currentIndex - 1;
            window.location.hash = `img-${prevIndex}`;
          }
        };
        window.addEventListener('keydown', handleEscape, true);
        window.addEventListener('keyup', handleEscape, true);
        document.addEventListener('keydown', handleEscape, true);
        window.addEventListener('keydown', handleArrowNavigation, true);
        document.addEventListener('keydown', handleArrowNavigation, true);
      })();
    </script> </main>  <div class="quick-nav" aria-label="Quick navigation" data-astro-cid-sckkx6r4> <a class="quick-nav__btn" href="/" data-astro-cid-sckkx6r4>Home</a> <button class="quick-nav__btn" type="button" data-back-btn data-astro-cid-sckkx6r4>Back</button> </div> <script>
